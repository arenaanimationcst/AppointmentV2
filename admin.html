<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Arena Animation CST</title>
<style>
  :root{
    --maroon:#6e1f2a;
    --maroon-dark:#4a141c;
    --gold:#c9a13b;
    --cream:#faf6ef;
    --ink:#2a2420;
    --muted:#8a7e74;
    --line:#e8ddd0;
    --green:#1ebd5a;
    --red:#d8503c;
    --orange:#e87c2b;
    --blue:#2563eb;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
    padding:20px 16px;
  }
  .wrap{max-width:600px;margin:0 auto;}
  .header{
    background:linear-gradient(135deg,var(--maroon) 0%,var(--maroon-dark) 100%);
    color:#fff;
    padding:20px;
    border-radius:14px;
    margin-bottom:20px;
    text-align:center;
  }
  .header .brand{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:4px;}
  .header h1{font-size:18px;font-weight:600;}

  /* TABS */
  .tabs{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  .tab-btn{
    flex:1;
    padding:12px;
    border:2px solid var(--line);
    border-radius:10px;
    background:#fff;
    font-size:14px;
    font-weight:700;
    color:var(--muted);
    cursor:pointer;
    transition:all 0.15s;
  }
  .tab-btn.active{
    border-color:var(--maroon);
    color:var(--maroon);
    background:#fff8f5;
  }
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  /* LOGIN */
  .login-card,.panel{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
    margin-bottom:16px;
  }
  .login-card input{
    width:100%;padding:12px 14px;
    border:1px solid var(--line);
    border-radius:10px;font-size:15px;margin-bottom:12px;
  }
  .login-card input:focus{outline:none;border-color:var(--maroon);}
  button{cursor:pointer;border:none;border-radius:10px;font-weight:700;font-size:14px;padding:12px 18px;}
  .btn-primary{background:var(--maroon);color:#fff;width:100%;}
  .btn-add{background:var(--gold);color:#4a3a10;width:100%;margin-top:10px;}
  .btn-save{background:var(--green);color:#fff;width:100%;margin-top:16px;font-size:16px;padding:14px;}
  .err{color:var(--red);font-size:13px;margin-bottom:8px;display:none;}

  /* SCHEDULE TAB */
  .date-card{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:var(--cream);}
  .date-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .date-title{font-weight:700;font-size:15px;color:var(--maroon);}
  .toggle{position:relative;width:42px;height:24px;background:#ddd;border-radius:12px;cursor:pointer;transition:background 0.15s;flex-shrink:0;}
  .toggle.on{background:var(--green);}
  .toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.15s;}
  .toggle.on::after{left:21px;}
  .slot-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .slot-row input[type=text]{flex:1;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;}
  .slot-row input[type=text]:focus{outline:none;border-color:var(--maroon);}
  .slot-toggle{width:36px;height:22px;background:#ddd;border-radius:11px;cursor:pointer;position:relative;flex-shrink:0;transition:background 0.15s;}
  .slot-toggle.on{background:var(--green);}
  .slot-toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.15s;}
  .slot-toggle.on::after{left:17px;}
  .remove-btn{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;}
  .remove-date{background:none;color:var(--red);font-size:13px;font-weight:600;padding:6px 0;border:none;}
  .add-date-row{display:flex;gap:8px;}
  .add-date-row input{flex:1;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:14px;}
  .status-msg{text-align:center;font-size:13px;padding:10px;border-radius:8px;margin-top:12px;display:none;}
  .status-msg.show{display:block;}
  .status-msg.ok{background:#e6f7ec;color:#1a7f3c;}
  .status-msg.error{background:#fbe9e7;color:#b3392c;}
  .hidden{display:none;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:20px 0;}

  /* PIPELINE TAB */
  .pipeline-toolbar{
    display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;
  }
  .filter-select{
    flex:1;min-width:120px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:14px;
    background:#fff;
  }
  .export-btn{
    padding:10px 16px;
    background:var(--maroon);
    color:#fff;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    white-space:nowrap;
  }
  .sub-tabs{
    display:flex;
    gap:6px;
    margin-bottom:14px;
    overflow-x:auto;
    padding-bottom:4px;
  }
  .sub-tab{
    padding:8px 14px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    border:1.5px solid var(--line);
    background:#fff;
    color:var(--muted);
    cursor:pointer;
    white-space:nowrap;
    transition:all 0.15s;
  }
  .sub-tab.active{border-color:var(--maroon);color:var(--maroon);background:#fff8f5;}
  .sub-tab .badge{
    display:inline-block;
    background:var(--maroon);
    color:#fff;
    border-radius:10px;
    font-size:11px;
    padding:1px 7px;
    margin-left:4px;
  }
  .sub-tab.active .badge{background:var(--maroon);}

  .booking-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px;
    margin-bottom:10px;
  }
  .booking-card-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:10px;
  }
  .booking-name{font-weight:700;font-size:15px;color:var(--ink);}
  .booking-meta{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.6;}
  .status-badge{
    font-size:11px;font-weight:700;
    padding:4px 10px;border-radius:20px;
    white-space:nowrap;flex-shrink:0;
  }
  .status-pending{background:#fff3cd;color:#856404;}
  .status-attended{background:#d1fae5;color:#065f46;}
  .status-rescheduled{background:#dbeafe;color:#1e40af;}
  .status-dropped{background:#fee2e2;color:#991b1b;}

  .booking-actions{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-top:10px;
  }
  .action-btn{
    padding:8px 12px;
    border-radius:8px;
    font-size:12px;
    font-weight:700;
    border:none;
    cursor:pointer;
    display:flex;align-items:center;gap:4px;
  }
  .btn-attended{background:#d1fae5;color:#065f46;}
  .btn-rescheduled{background:#dbeafe;color:#1e40af;}
  .btn-dropped{background:#fee2e2;color:#991b1b;}
  .btn-wa{background:#25D366;color:#fff;}
  .btn-delete{background:#fff;border:1.5px solid var(--line) !important;color:var(--red);}
  .btn-pending{background:#fff3cd;color:#856404;}

  .pipeline-empty{
    text-align:center;
    padding:40px 20px;
    color:var(--muted);
    font-size:14px;
  }
  .pipeline-loading{
    text-align:center;
    padding:30px;
    color:var(--muted);
    font-size:13px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="brand">Arena Animation CST</div>
    <h1>Admin Panel</h1>
  </div>

  <div class="login-card" id="loginCard">
    <div class="err" id="loginErr">Incorrect password. Try again.</div>
    <input type="password" id="passInput" placeholder="Enter admin password">
    <button class="btn-primary" onclick="checkLogin()">Unlock</button>
  </div>

  <div id="adminPanel" class="hidden">
    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('schedule')">📅 Schedule</button>
      <button class="tab-btn" onclick="switchTab('pipeline')">📋 Pipeline</button>
    </div>

    <!-- SCHEDULE TAB -->
    <div class="tab-content active" id="tab-schedule">
      <div class="panel">
        <div class="date-title" style="margin-bottom:10px;">Add new date</div>
        <div class="add-date-row">
          <input type="date" id="newDateInput">
          <button class="btn-primary" style="width:auto;" onclick="addDate()">Add</button>
        </div>
      </div>
      <div id="datesContainer"></div>
      <button class="btn-save" onclick="saveConfig()">Save changes</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <!-- PIPELINE TAB -->
    <div class="tab-content" id="tab-pipeline">
      <div class="pipeline-toolbar">
        <select class="filter-select" id="dateFilter" onchange="renderPipeline()">
          <option value="">All dates</option>
        </select>
        <button class="export-btn" onclick="exportExcel()">⬇ Export Excel</button>
      </div>

      <div class="sub-tabs" id="subTabs">
        <div class="sub-tab active" onclick="setSubTab('all')" id="st-all">All <span class="badge" id="badge-all">0</span></div>
        <div class="sub-tab" onclick="setSubTab('pending')" id="st-pending">Pending <span class="badge" id="badge-pending">0</span></div>
        <div class="sub-tab" onclick="setSubTab('attended')" id="st-attended">✅ Attended <span class="badge" id="badge-attended">0</span></div>
        <div class="sub-tab" onclick="setSubTab('rescheduled')" id="st-rescheduled">🔄 Rescheduled <span class="badge" id="badge-rescheduled">0</span></div>
        <div class="sub-tab" onclick="setSubTab('dropped')" id="st-dropped">❌ Dropped <span class="badge" id="badge-dropped">0</span></div>
      </div>

      <div id="pipelineContainer"><div class="pipeline-loading">Loading bookings...</div></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBP2AEZ4m3p7IxyW0u2uj07i2VofJv0Y0E",
  authDomain: "arenaaspire-4578c.firebaseapp.com",
  projectId: "arenaaspire-4578c",
  storageBucket: "arenaaspire-4578c.firebasestorage.app",
  messagingSenderId: "320361458444",
  appId: "1:320361458444:web:0db9aaba48e034c41df729"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSWORD = "Arena@Faiz786";
const ARENA_NUMBER = "918828823738";

let config = { dates: {} };
let bookings = [];
let activeSubTab = 'all';

// ── LOGIN ──
function checkLogin(){
  const val = document.getElementById('passInput').value;
  if(val === ADMIN_PASSWORD){
    document.getElementById('loginCard').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    loadConfig();
    loadBookings();
  }else{
    document.getElementById('loginErr').style.display = 'block';
  }
}

// ── TAB SWITCHING ──
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', (i===0&&tab==='schedule')||(i===1&&tab==='pipeline'));
  });
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='pipeline') renderPipeline();
}

function setSubTab(tab){
  activeSubTab = tab;
  document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('st-'+tab).classList.add('active');
  renderPipeline();
}

// ── SCHEDULE ──
async function loadConfig(){
  try{
    const snap = await getDoc(doc(db,"slotConfig","main"));
    config = (snap.exists() && snap.data().dates) ? snap.data() : { dates:{} };
  }catch(e){ config = {dates:{}}; }
  const changed = maintainRollingDates();
  if(changed){
    try{ await setDoc(doc(db,"slotConfig","main"), config); }catch(e){}
  }
  renderSchedule();
}

function maintainRollingDates(){
  const today = new Date(); today.setHours(0,0,0,0);
  const windowDates = [];
  for(let i=-6;i<=5;i++){
    const d = new Date(today); d.setDate(today.getDate()+i);
    windowDates.push(d.toISOString().split('T')[0]);
  }
  let changed = false;
  Object.keys(config.dates).forEach(dateStr=>{
    if(!windowDates.includes(dateStr)){ delete config.dates[dateStr]; changed=true; }
  });
  Object.keys(config.dates).forEach(dateStr=>{
    const d = new Date(dateStr+"T00:00:00");
    if(d < today && config.dates[dateStr].available !== false){
      config.dates[dateStr].available = false;
      (config.dates[dateStr].slots||[]).forEach(s=>{ s.available=false; });
      changed=true;
    }
  });
  windowDates.forEach(dateStr=>{
    if(!config.dates[dateStr]){
      const d = new Date(dateStr+"T00:00:00");
      const isFuture = d >= today;
      config.dates[dateStr] = { available:isFuture, slots:DEFAULT_SLOTS.map(t=>({time:t,available:isFuture})) };
      changed=true;
    }
  });
  return changed;
}

const DEFAULT_SLOTS = ["10:00 AM","11:00 AM","12:30 PM","1:00 PM","1:30 PM","3:00 PM","3:30 PM","4:30 PM","5:00 PM","6:00 PM","6:30 PM","7:00 PM"];

function renderSchedule(){
  const container = document.getElementById('datesContainer');
  const dates = Object.keys(config.dates).sort();
  if(dates.length===0){ container.innerHTML='<div class="empty">No dates added yet.</div>'; return; }
  let html='';
  dates.forEach(dateStr=>{
    const dayConf = config.dates[dateStr];
    const fullDate = new Date(dateStr+"T00:00:00").toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    const isOn = dayConf.available !== false;
    html+=`<div class="date-card">
      <div class="date-card-head">
        <div class="date-title">${fullDate}</div>
        <div class="toggle ${isOn?'on':''}" onclick="toggleDate('${dateStr}')"></div>
      </div>`;
    (dayConf.slots||[]).forEach((slot,idx)=>{
      const slotOn = slot.available !== false;
      html+=`<div class="slot-row">
        <input type="text" value="${slot.time}" onchange="updateSlotTime('${dateStr}',${idx},this.value)" placeholder="e.g. 4:00 PM">
        <div class="slot-toggle ${slotOn?'on':''}" onclick="toggleSlot('${dateStr}',${idx})"></div>
        <button class="remove-btn" onclick="removeSlot('${dateStr}',${idx})">&times;</button>
      </div>`;
    });
    html+=`<button class="btn-add" onclick="addSlot('${dateStr}')">+ Add time slot</button>
      <button class="remove-date" onclick="removeDate('${dateStr}')">Remove this date</button>
    </div>`;
  });
  container.innerHTML=html;
}

function addDate(){
  const input = document.getElementById('newDateInput');
  const val = input.value;
  if(!val) return;
  if(!config.dates[val]) config.dates[val]={available:true,slots:DEFAULT_SLOTS.map(t=>({time:t,available:true}))};
  input.value=''; renderSchedule();
}
function removeDate(d){ delete config.dates[d]; renderSchedule(); }
function toggleDate(d){ config.dates[d].available = config.dates[d].available===false?true:false; renderSchedule(); }
function addSlot(d){ config.dates[d].slots.push({time:"",available:true}); renderSchedule(); }
function removeSlot(d,i){ config.dates[d].slots.splice(i,1); renderSchedule(); }
function updateSlotTime(d,i,v){ config.dates[d].slots[i].time=v; }
function toggleSlot(d,i){ const s=config.dates[d].slots[i]; s.available=s.available===false?true:false; renderSchedule(); }

async function saveConfig(){
  const msg = document.getElementById('statusMsg');
  try{
    await setDoc(doc(db,"slotConfig","main"), config);
    msg.className="status-msg show ok"; msg.textContent="Saved! Changes are live now.";
  }catch(e){
    msg.className="status-msg show error"; msg.textContent="Could not save. Check internet and try again.";
  }
  setTimeout(()=>msg.classList.remove('show'),3000);
}

// ── PIPELINE ──
async function loadBookings(){
  try{
    const snap = await getDocs(collection(db,"bookings"));
    bookings = snap.docs.map(d=>({id:d.id,...d.data()}));
    // Populate date filter
    const dates = [...new Set(bookings.map(b=>b.date).filter(Boolean))].sort();
    const sel = document.getElementById('dateFilter');
    sel.innerHTML = '<option value="">All dates</option>';
    dates.forEach(d=>{
      const label = new Date(d+"T00:00:00").toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
      sel.innerHTML += `<option value="${d}">${label}</option>`;
    });
    renderPipeline();
  }catch(e){
    document.getElementById('pipelineContainer').innerHTML='<div class="pipeline-empty">Could not load bookings.</div>';
  }
}

function renderPipeline(){
  const dateFilter = document.getElementById('dateFilter')?.value || '';
  let filtered = bookings;
  if(dateFilter) filtered = filtered.filter(b=>b.date===dateFilter);

  // Count badges
  const counts = {all:filtered.length, pending:0, attended:0, rescheduled:0, dropped:0};
  filtered.forEach(b=>{ const s=b.status||'pending'; if(counts[s]!==undefined) counts[s]++; });
  Object.keys(counts).forEach(k=>{ const el=document.getElementById('badge-'+k); if(el) el.textContent=counts[k]; });

  // Sub-tab filter
  if(activeSubTab!=='all') filtered=filtered.filter(b=>(b.status||'pending')===activeSubTab);

  // Sort newest first
  filtered.sort((a,b)=>new Date(b.bookedAt||0)-new Date(a.bookedAt||0));

  const container = document.getElementById('pipelineContainer');
  if(filtered.length===0){
    container.innerHTML='<div class="pipeline-empty">No bookings here yet.</div>';
    return;
  }

  let html='';
  filtered.forEach(b=>{
    const status = b.status||'pending';
    const dateLabel = b.date ? new Date(b.date+"T00:00:00").toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const bookedAt = b.bookedAt ? new Date(b.bookedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';

    const statusMap = {pending:'Pending',attended:'Attended',rescheduled:'Rescheduled',dropped:'Dropped'};
    const badgeClass = {pending:'status-pending',attended:'status-attended',rescheduled:'status-rescheduled',dropped:'status-dropped'};

    const waMsg = encodeURIComponent(`Hi ${b.name||''}, this is Arena Animation CST. Just checking in regarding your appointment on ${dateLabel} at ${b.slot||''}. Please let us know if you need any changes!`);

    html+=`<div class="booking-card">
      <div class="booking-card-head">
        <div>
          <div class="booking-name">${b.name||'Unknown'}</div>
          <div class="booking-meta">
            📱 ${b.mobile||'—'} &nbsp;|&nbsp; 📅 ${dateLabel} &nbsp;|&nbsp; ⏰ ${b.slot||'—'}<br>
            👨‍👩‍👦 ${b.parentGuardian||'—'}<br>
            ${bookedAt ? '🕐 Booked: '+bookedAt : ''}
          </div>
        </div>
        <span class="status-badge ${badgeClass[status]}">${statusMap[status]}</span>
      </div>
      <div class="booking-actions">
        ${status!=='attended'?`<button class="action-btn btn-attended" onclick="updateStatus('${b.id}','attended')">✅ Done</button>`:''}
        ${status!=='rescheduled'?`<button class="action-btn btn-rescheduled" onclick="updateStatus('${b.id}','rescheduled')">🔄 Reschedule</button>`:''}
        ${status!=='dropped'?`<button class="action-btn btn-dropped" onclick="updateStatus('${b.id}','dropped')">❌ No Show</button>`:''}
        ${status!=='pending'?`<button class="action-btn btn-pending" onclick="updateStatus('${b.id}','pending')">↩ Pending</button>`:''}
        <a class="action-btn btn-wa" href="https://wa.me/${b.mobile?'91'+b.mobile:ARENA_NUMBER}?text=${waMsg}" target="_blank">💬 WhatsApp</a>
        <button class="action-btn btn-delete" onclick="deleteBooking('${b.id}')">🗑</button>
      </div>
    </div>`;
  });
  container.innerHTML=html;
}

async function updateStatus(id, status){
  try{
    await updateDoc(doc(db,"bookings",id), {status});
    const b = bookings.find(x=>x.id===id);
    if(b) b.status=status;
    renderPipeline();
  }catch(e){ alert('Could not update. Check internet.'); }
}

async function deleteBooking(id){
  if(!confirm('Delete this booking?')) return;
  try{
    await deleteDoc(doc(db,"bookings",id));
    bookings = bookings.filter(b=>b.id!==id);
    renderPipeline();
  }catch(e){ alert('Could not delete. Check internet.'); }
}

function exportExcel(){
  const dateFilter = document.getElementById('dateFilter')?.value || '';
  let filtered = bookings;
  if(dateFilter) filtered = filtered.filter(b=>b.date===dateFilter);
  if(activeSubTab!=='all') filtered = filtered.filter(b=>(b.status||'pending')===activeSubTab);

  if(filtered.length===0){ alert('No bookings to export.'); return; }

  const headers = ['Name','Mobile','Date','Slot','Parent/Guardian','Status','Booked At'];
  const rows = filtered.map(b=>[
    b.name||'',
    b.mobile||'',
    b.date||'',
    b.slot||'',
    b.parentGuardian||'',
    b.status||'pending',
    b.bookedAt ? new Date(b.bookedAt).toLocaleString('en-IN') : ''
  ]);

  let csv = [headers,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='arena-bookings.csv'; a.click();
  URL.revokeObjectURL(url);
}

// Expose to window
window.checkLogin=checkLogin;
window.switchTab=switchTab;
window.setSubTab=setSubTab;
window.addDate=addDate;
window.removeDate=removeDate;
window.toggleDate=toggleDate;
window.addSlot=addSlot;
window.removeSlot=removeSlot;
