<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Manage Reschedule Slots</title>
<style>
  :root{
    --maroon:#6e1f2a;
    --maroon-dark:#4a141c;
    --gold:#c9a13b;
    --cream:#faf6ef;
    --ink:#2a2420;
    --muted:#8a7e74;
    --line:#e8ddd0;
    --green:#1ebd5a;
    --red:#d8503c;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
    padding:20px 16px;
  }
  .wrap{max-width:520px;margin:0 auto;}
  .header{
    background:linear-gradient(135deg,var(--maroon) 0%,var(--maroon-dark) 100%);
    color:#fff;
    padding:20px;
    border-radius:14px;
    margin-bottom:20px;
  }
  .header .brand{
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin-bottom:4px;
  }
  .header h1{font-size:18px;font-weight:600;}

  .login-card, .panel{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
    margin-bottom:16px;
  }
  .login-card input{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:15px;
    margin-bottom:12px;
  }
  .login-card input:focus{outline:none;border-color:var(--maroon);}
  button{
    cursor:pointer;
    border:none;
    border-radius:10px;
    font-weight:700;
    font-size:14px;
    padding:12px 18px;
  }
  .btn-primary{
    background:var(--maroon);
    color:#fff;
    width:100%;
  }
  .btn-add{
    background:var(--gold);
    color:#4a3a10;
    width:100%;
    margin-top:10px;
  }
  .btn-save{
    background:var(--green);
    color:#fff;
    width:100%;
    margin-top:16px;
    font-size:16px;
    padding:14px;
  }
  .err{color:var(--red);font-size:13px;margin-bottom:8px;display:none;}
  .date-card{
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px;
    margin-bottom:12px;
    background:var(--cream);
  }
  .date-card-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .date-title{
    font-weight:700;
    font-size:15px;
    color:var(--maroon);
  }
  .toggle{
    position:relative;
    width:42px;
    height:24px;
    background:#ddd;
    border-radius:12px;
    cursor:pointer;
    transition:background 0.15s;
    flex-shrink:0;
  }
  .toggle.on{background:var(--green);}
  .toggle::after{
    content:'';
    position:absolute;
    width:18px;height:18px;
    border-radius:50%;
    background:#fff;
    top:3px;left:3px;
    transition:left 0.15s;
  }
  .toggle.on::after{left:21px;}
  .slot-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
  }
  .slot-row input[type=text]{
    flex:1;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:14px;
  }
  .slot-row input[type=text]:focus{outline:none;border-color:var(--maroon);}
  .slot-toggle{
    width:36px;height:22px;
    background:#ddd;
    border-radius:11px;
    cursor:pointer;
    position:relative;
    flex-shrink:0;
    transition:background 0.15s;
  }
  .slot-toggle.on{background:var(--green);}
  .slot-toggle::after{
    content:'';position:absolute;width:16px;height:16px;border-radius:50%;
    background:#fff;top:3px;left:3px;transition:left 0.15s;
  }
  .slot-toggle.on::after{left:17px;}
  .remove-btn{
    background:none;
    border:none;
    color:var(--red);
    font-size:18px;
    cursor:pointer;
    padding:0 4px;
    flex-shrink:0;
  }
  .remove-date{
    background:none;
    color:var(--red);
    font-size:13px;
    font-weight:600;
    padding:6px 0;
    border:none;
  }
  .add-date-row{
    display:flex;
    gap:8px;
  }
  .add-date-row input{
    flex:1;
    padding:11px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:14px;
  }
  .status-msg{
    text-align:center;
    font-size:13px;
    padding:10px;
    border-radius:8px;
    margin-top:12px;
    display:none;
  }
  .status-msg.show{display:block;}
  .status-msg.ok{background:#e6f7ec;color:#1a7f3c;}
  .status-msg.error{background:#fbe9e7;color:#b3392c;}
  .hidden{display:none;}
  .empty{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    padding:20px 0;
  }
</style>
</head>

  appId: "1:320361458444:web:0db9aaba48e034c41df729"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSWORD = "Arena@Faiz786";

let config = { dates: {} };

function checkLogin(){
  const val = document.getElementById('passInput').value;
  if(val === ADMIN_PASSWORD){
    document.getElementById('loginCard').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    loadConfig();
  }else{
    document.getElementById('loginErr').style.display = 'block';
  }
}

async function loadConfig(){
  try{
    const docRef = doc(db, "slotConfig", "main");
    const snap = await getDoc(docRef);
    config = (snap.exists() && snap.data().dates) ? snap.data() : { dates: {} };
  }catch(e){
    config = { dates: {} };
  }
  render();
}

function render(){
  const container = document.getElementById('datesContainer');
  const dates = Object.keys(config.dates).sort();

  if(dates.length === 0){
    container.innerHTML = '<div class="empty">No dates added yet.</div>';
    return;
  }

  let html = '';
  dates.forEach(dateStr=>{
    const dayConf = config.dates[dateStr];
    const fullDate = new Date(dateStr+"T00:00:00").toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    const isOn = dayConf.available !== false;

    html += `<div class="date-card">
      <div class="date-card-head">
        <div class="date-title">${fullDate}</div>
        <div class="toggle ${isOn?'on':''}" onclick="toggleDate('${dateStr}')"></div>
      </div>`;

    (dayConf.slots || []).forEach((slot, idx)=>{
      const slotOn = slot.available !== false;
      html += `<div class="slot-row">
        <input type="text" value="${slot.time}" onchange="updateSlotTime('${dateStr}',${idx},this.value)" placeholder="e.g. 4:00 PM">
        <div class="slot-toggle ${slotOn?'on':''}" onclick="toggleSlot('${dateStr}',${idx})"></div>
        <button class="remove-btn" onclick="removeSlot('${dateStr}',${idx})">&times;</button>
      </div>`;
    });

    html += `<button class="btn-add" onclick="addSlot('${dateStr}')">+ Add time slot</button>
      <button class="remove-date" onclick="removeDate('${dateStr}')">Remove this date</button>
    </div>`;
  });

  container.innerHTML = html;
}

const DEFAULT_SLOTS = ["10:00 AM","11:00 AM","12:30 PM","1:00 PM","1:30 PM","3:00 PM","3:30 PM","4:30 PM","5:00 PM","6:00 PM","6:30 PM","7:00 PM"];

function addDate(){
  const input = document.getElementById('newDateInput');
  const val = input.value;
  if(!val) return;
  if(!config.dates[val]){
    config.dates[val] = { available: true, slots: DEFAULT_SLOTS.map(t=>({time:t, available:true})) };
  }
  input.value = '';
  render();
}

function removeDate(dateStr){
  delete config.dates[dateStr];
  render();
}

function toggleDate(dateStr){
  config.dates[dateStr].available = config.dates[dateStr].available === false ? true : false;
  render();
}

function addSlot(dateStr){
  config.dates[dateStr].slots.push({ time: "", available: true });
  render();
}

function removeSlot(dateStr, idx){
  config.dates[dateStr].slots.splice(idx,1);
  render();
}

function updateSlotTime(dateStr, idx, val){
  config.dates[dateStr].slots[idx].time = val;
}

function toggleSlot(dateStr, idx){
  const slot = config.dates[dateStr].slots[idx];
  slot.available = slot.available === false ? true : false;
  render();
}

async function saveConfig(){
  const statusMsg = document.getElementById('statusMsg');
  try{
    const docRef = doc(db, "slotConfig", "main");
    await setDoc(docRef, config);
    statusMsg.className = "status-msg show ok";
    statusMsg.textContent = "Saved! Changes are live now.";
  }catch(e){
    statusMsg.className = "status-msg show error";
    statusMsg.textContent = "Could not save. Check your internet and try again.";
  }
  setTimeout(()=>{ statusMsg.classList.remove('show'); }, 3000);
}

// Expose all functions used by inline onclick handlers
window.checkLogin = checkLogin;
window.addDate = addDate;
window.removeDate = removeDate;
window.toggleDate = toggleDate;
window.addSlot = addSlot;
window.removeSlot = removeSlot;
window.updateSlotTime = updateSlotTime;
window.toggleSlot = toggleSlot;
window.saveConfig = saveConfig;
</script>

</body>
</html>
